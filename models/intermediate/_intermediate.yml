version: 2

models:
  - name: int_invoice_monthly_amortized
    description: >
      Each invoice expanded into one row per calendar month it covers,
      with the amount distributed proportionally. Credit notes (negative amounts)
      are distributed the same way, reducing MRR in the affected months.
    columns:
      - name: invoice_id
        description: Original invoice identifier (not unique — one invoice produces multiple rows).
        data_tests:
          - not_null
      - name: month
        description: First day of the calendar month this revenue is attributed to.
        data_tests:
          - not_null
      - name: mrr_usd
        description: Monthly portion of invoice amount (amount_usd / months_covered).
        data_tests:
          - not_null
      - name: months_covered
        description: Number of months the invoice billing period spans.
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 1
              max_value: 12
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - invoice_id
            - month